<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftLink｜シフト・予約・売上をスマホひとつで</title>
  <meta name="description" content="メンズエステ・サロン店舗向けのシフト・予約・売上・委託金管理アプリ ShiftLink。スマホだけで店舗運営が完結します。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: #333;
    }
    /* モバイル幅でセンタリング（PCでも中央に縦長表示） */
    .lp {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    .lp img {
      display: block;
      width: 100%;
      height: auto;
      /* 画像同士の継ぎ目をなくす */
      margin: 0;
      padding: 0;
      vertical-align: top;
    }
    /* 各パネルにCTAリンクを重ねる（必要に応じて座標調整） */
    .panel { position: relative; font-size: 0; }
    .cta-link {
      position: absolute;
      display: block;
      /* 透明クリック領域。デバッグ時は background を半透明に */
      background: transparent;
    }
    /* 申込フォームURLは下記の href をまとめて差し替えてください */

    /* 無料トライアル訴求バナー（白×オレンジ） */
    .trial-band {
      background: linear-gradient(135deg, #ff8a1e 0%, #ff6a00 100%);
      color: #fff;
      text-align: center;
      padding: 22px 18px;
    }
    .trial-band .badge {
      display: inline-block;
      background: #fff;
      color: #ff6a00;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .04em;
      border-radius: 999px;
      padding: 5px 14px;
      margin-bottom: 12px;
    }
    .trial-band .headline {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .trial-band .sub {
      font-size: 13px;
      line-height: 1.6;
      opacity: .95;
    }
    .trial-band.before-cta { padding-bottom: 24px; }
    .trial-band .start-btn {
      display: inline-block;
      margin-top: 16px;
      background: #fff;
      color: #ff6a00;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 34px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }
  </style>
</head>
<body>
  <div class="lp">

    <!-- 1. ヒーロー -->
    <div class="panel">
      <img src="images/01-hero.png" alt="事務作業に追われる店舗運営を、スマホひとつに。ShiftLink">
      <!-- 「無料で始める」ボタン位置（おおよそ。実画像に合わせて top/left/width/height を調整） -->
      <a class="cta-link" href="https://line.me/R/ti/p/@188wjjxv" style="top:59%; left:3%; width:40%; height:7%;"></a>
    </div>

    <!-- 1.5 無料トライアル訴求（ファーストビュー直下） -->
    <div class="trial-band">
      <span class="badge">14日間無料 ／ カード登録なし</span>
      <div class="headline">まずは無料で、<br>今月の店の数字を見てから決めてください。</div>
      <div class="sub">クレジットカードの登録は不要。14日間、全機能をそのままお試しいただけます。</div>
    </div>

    <!-- 2. お悩み -->
    <div class="panel">
      <img src="images/02-problems.png" alt="こんなお悩み、ありませんか？">
    </div>

    <!-- 3. 解決 -->
    <div class="panel">
      <img src="images/03-solution.png" alt="その悩み、ShiftLinkがまとめて解決。">
      <a class="cta-link" href="https://line.me/R/ti/p/@188wjjxv" style="top:85%; left:14%; width:75%; height:8%;"></a>
    </div>

    <!-- 4. 特徴 -->
    <div class="panel">
      <img src="images/04-features.png" alt="サービスの特徴">
    </div>

    <!-- 5. ビフォーアフター -->
    <div class="panel">
      <img src="images/05-before-after.png" alt="導入すると、こう変わる。">
    </div>

    <!-- 6. お客様の声 -->
    <div class="panel">
      <img src="images/06-voice.png" alt="導入店舗からの声">
    </div>

    <!-- 7. 料金 -->
    <div class="panel">
      <img src="images/07-pricing.png" alt="シンプルな料金体系 スタンダードプラン ¥14,800 税抜・月額">
      <a class="cta-link" href="https://line.me/R/ti/p/@188wjjxv" style="top:85.5%; left:14%; width:72%; height:7%;"></a>
    </div>

    <!-- 7.5 無料トライアル訴求（CTA直前） -->
    <div class="trial-band before-cta">
      <span class="badge">14日間無料 ／ カード登録なし</span>
      <div class="headline">いきなり契約しなくて大丈夫です。</div>
      <div class="sub">14日間、無料で全機能をお試しいただけます。<br>クレジットカードの登録は不要。続けるか決めるのは、使ってみた後で。</div>
      <a class="start-btn" href="https://line.me/R/ti/p/@188wjjxv">無料で始める</a>
    </div>

    <!-- 8. FAQ＋フッター -->
    <div class="panel" id="contact">
      <img src="images/08-faq-footer.png" alt="よくあるご質問・お問い合わせ">
      <!-- 最終CTA「無料で始める」 -->
      <a class="cta-link" href="https://line.me/R/ti/p/@188wjjxv" style="top:82%; left:18%; width:63%; height:7%;"></a>
      <!-- フッターのリンク -->
      <a class="cta-link" href="terms.html"      style="top:92.5%; left:42%; width:18%; height:3.5%;"></a>
      <a class="cta-link" href="privacy.html"    style="top:92.5%; left:62%; width:30%; height:3.5%;"></a>
      <a class="cta-link" href="tokushoho.html"  style="top:96.3%; left:42%; width:32%; height:3.5%;"></a>
      <a class="cta-link" href="https://line.me/R/ti/p/@188wjjxv" style="top:96.3%; left:75%; width:21%; height:3.5%;"></a>
    </div>

  </div>
</body>
</html>
