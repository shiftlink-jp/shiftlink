<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>ご予約内容の確認</title>
<style>
  :root{
    --accent:#F5820A; --accent2:#ff9e3d; --ink:#2b2b2b; --sub:#8a8a8a;
    --line:#eee; --bg:#faf7f4; --card:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;padding:0 0 3rem}
  .wrap{max-width:460px;margin:0 auto;padding:0 1rem}
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
    padding:1.6rem 1.2rem 1.4rem;border-radius:0 0 20px 20px;box-shadow:0 6px 18px rgba(245,130,10,.25)}
  .hero .store{font-size:.8rem;opacity:.92;font-weight:600;letter-spacing:.02em}
  .hero .ttl{font-size:1.25rem;font-weight:800;margin-top:.15rem}
  .hero .cust{font-size:.95rem;margin-top:.5rem;background:rgba(255,255,255,.2);
    display:inline-block;padding:.2rem .7rem;border-radius:999px;font-weight:700}
  .card{background:var(--card);border-radius:16px;padding:1rem 1.1rem;margin-top:1rem;
    box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .sec{font-size:.72rem;font-weight:700;color:var(--accent);letter-spacing:.05em;
    margin:0 0 .5rem;text-transform:none}
  .greeting{font-size:.92rem;line-height:1.8;color:#444;white-space:normal}
  .row{display:flex;justify-content:space-between;align-items:baseline;
    padding:.5rem 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .lbl{color:var(--sub);font-size:.82rem;flex:0 0 auto}
  .row .val{font-weight:700;text-align:right;font-size:.95rem;margin-left:1rem}
  .big{font-size:1.15rem}
  .fee{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;font-size:.88rem}
  .fee .nm{color:var(--ink)}
  .fee .pay{font-size:.66rem;color:var(--sub);border:1px solid var(--line);
    border-radius:999px;padding:.05rem .5rem;margin-left:.4rem}
  .fee .amt{font-weight:700;margin-left:auto;padding-left:.6rem}
  .total-box{background:linear-gradient(135deg,#fff7ee,#fff);border:1.5px solid #ffe0bd;
    border-radius:14px;padding:.9rem 1.1rem;margin-top:.8rem;display:flex;
    justify-content:space-between;align-items:center}
  .total-box .l{font-size:.85rem;color:var(--sub);font-weight:700}
  .total-box .v{font-size:1.5rem;font-weight:800;color:var(--accent)}
  .split{display:flex;gap:.6rem;margin-top:.6rem}
  .split .b{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:.6rem;text-align:center}
  .split .b .l{font-size:.72rem;color:var(--sub)}
  .split .b .v{font-size:1.05rem;font-weight:800;margin-top:.1rem}
  .addr{font-size:.9rem;font-weight:700}
  .maplink{display:inline-block;margin-top:.5rem;font-size:.8rem;color:var(--accent);
    font-weight:700;text-decoration:none;border:1.5px solid var(--accent);
    border-radius:999px;padding:.35rem .9rem}
  .note{font-size:.85rem;white-space:pre-wrap;color:#555}
  .foot{text-align:center;color:var(--sub);font-size:.72rem;margin-top:1.5rem;line-height:1.7}
  .state{text-align:center;padding:4rem 1.5rem;color:var(--sub)}
  .state .em{font-size:2.5rem;margin-bottom:.6rem}
  .state .t{font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:.3rem}
  .spin{width:34px;height:34px;border:3px solid #f0e5da;border-top-color:var(--accent);
    border-radius:50%;animation:sp .8s linear infinite;margin:4rem auto}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div id="app">
    <div class="spin"></div>
  </div>

<script>
(function(){
  const app = document.getElementById('app')
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  const yen = n => '¥' + Math.round(Number(n)||0).toLocaleString()

  // 表示元のホスト名から Supabase プロジェクトを判定（index.html と同じ規則）
  const SAAS = location.hostname === 'app.shiftlink.jp' || location.hostname === 'shiftlink-app.jp' || location.hostname.endsWith('.shiftlink-app.jp')
  const SUPA_URL = SAAS ? 'https://fewuonnrgqnxtopkjudt.supabase.co' : 'https://qgcgkrcrfzonmmygcdju.supabase.co'
  const ANON = SAAS
    ? 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZld3Vvbm5yZ3FueHRvcGtqdWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMjc0MDYsImV4cCI6MjA5NDYwMzQwNn0.u3kDWsXElpR1w_WMWm-fYG-M5iPaQ3LQdSt8WlGE41U'
    : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnY2drcmNyZnpvbm1teWdjZGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTY3NDcsImV4cCI6MjA5MDc3Mjc0N30.2kTAP333XfchMUpOJQB-Ex44wdj51JqjJR9nyTboBPE'

  function stateView(em, title, msg){
    app.innerHTML = `<div class="state"><div class="em">${em}</div><div class="t">${esc(title)}</div><div>${esc(msg)}</div></div>`
  }

  const token = new URLSearchParams(location.search).get('t') || ''
  if(!token){ stateView('🔍','リンクが正しくありません','お手数ですが、店舗までお問い合わせください。'); return }

  fetch(`${SUPA_URL}/functions/v1/get-reservation-public?t=${encodeURIComponent(token)}`, {
    headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON }
  })
  .then(async res => {
    const body = await res.json().catch(()=>({}))
    if(res.status === 410){ stateView('⏰','このご予約は終了しました','ご予約日を過ぎたため、この画面は表示できません。'); return }
    if(res.status === 404 || res.status === 400){ stateView('🔍','ご予約が見つかりません','リンクが無効か、変更された可能性があります。店舗までお問い合わせください。'); return }
    if(!res.ok || !body.snapshot){ stateView('⚠️','表示できませんでした','時間をおいて再度お試しください。'); return }
    render(body.snapshot)
  })
  .catch(()=>stateView('⚠️','通信に失敗しました','電波の良い場所で再度お試しください。'))

  function render(s){
    const items = Array.isArray(s.items) ? s.items : []
    const feeRows = items.map(it => `
      <div class="fee">
        <span class="nm">${esc(it.name)}</span>
        ${it.pay?`<span class="pay">${esc(it.pay)}</span>`:''}
        <span class="amt">${yen(it.amount)}</span>
      </div>`).join('')

    const hasSplit = (Number(s.cash)>0 && Number(s.card)>0)
    const mapUrl = s.address ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.address) : ''

    app.innerHTML = `
      <div class="hero">
        <div class="wrap" style="padding:0">
          ${s.store?`<div class="store">${esc(s.store)}</div>`:''}
          <div class="ttl">ご予約内容の確認</div>
          ${s.customerName?`<div class="cust">${esc(s.customerName)}</div>`:''}
        </div>
      </div>
      <div class="wrap">
        ${s.greeting?`<div class="card greeting">${esc(s.greeting).replace(/\n/g,'<br>')}</div>`:''}
        <div class="card">
          <div class="sec">ご予約</div>
          ${row('ご予約日', s.dateLabel || s.date || '')}
          ${s.checkin?row('ご案内時間', s.checkin, true):''}
          ${s.cast?row('担当セラピスト', s.cast):''}
          ${s.shimei && s.shimei!=='なし'?row('区分', s.shimei):''}
          ${s.course?row('コース', s.course):''}
        </div>

        ${items.length?`<div class="card">
          <div class="sec">料金</div>
          ${feeRows}
          <div class="total-box"><div class="l">合計</div><div class="v">${yen(s.total)}</div></div>
          ${hasSplit?`<div class="split">
            <div class="b"><div class="l">現金</div><div class="v">${yen(s.cash)}</div></div>
            <div class="b"><div class="l">カード</div><div class="v">${yen(s.card)}</div></div>
          </div>`:''}
        </div>`:''}

        ${(s.address||s.roomName)?`<div class="card">
          <div class="sec">場所</div>
          ${s.roomName?`<div class="row"><span class="lbl">ルーム</span><span class="val">${esc(s.roomName)}</span></div>`:''}
          ${s.address?`<div style="padding-top:.5rem"><div class="addr">${esc(s.address)}</div>
            <a class="maplink" href="${esc(mapUrl)}" target="_blank" rel="noopener">地図で見る</a></div>`:''}
        </div>`:''}

        ${s.note?`<div class="card"><div class="sec">ご案内</div><div class="note">${esc(s.note)}</div></div>`:''}

        <div class="foot">
          ご不明な点はお手数ですが店舗までお問い合わせください。<br>
          この画面はご予約者様専用です。<br>
          Powered by ShiftLink
        </div>
      </div>`

    function row(lbl,val,big){return `<div class="row"><span class="lbl">${esc(lbl)}</span><span class="val${big?' big':''}">${esc(val)}</span></div>`}
  }
  function row(lbl,val,big){return `<div class="row"><span class="lbl">${esc(lbl)}</span><span class="val${big?' big':''}">${esc(val)}</span></div>`}
})();
</script>
</body>
</html>
